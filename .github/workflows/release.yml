name: Build Release Artifacts

# Triggered when a GitHub Release is PUBLISHED -- not on tag push. This project
# is distributed via GitHub only (no PyPI), so this workflow just builds and
# validates the sdist/wheel and attaches them as workflow artifacts for the
# release. If PyPI publishing is added later, restore a `publish` job that keys
# off this build (see git-repokit-template for the trusted-publisher pattern).
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    # Skip on the template repo itself (no pyproject.toml until instantiated)
    if: github.repository != 'DazzleTools/git-repokit-template'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: python -m build

    - name: Check package
      run: |
        pip install twine
        twine check dist/*

    - uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist/
